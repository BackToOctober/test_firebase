version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fcm_postgres
    environment:
      POSTGRES_USER: fcm_user
      POSTGRES_PASSWORD: fcm_password
      POSTGRES_DB: fcm_db
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
